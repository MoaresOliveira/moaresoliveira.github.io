<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Moares Oliveira</title>
    <link rel="shortcut icon" href="./assets/img/logo.png" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.gstatic.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500&display=swap" rel="stylesheet"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header>
      <img class="logo" src="./assets/img/logo.png" alt="Logo Moares"/>

      <nav>
        <a href="#skills" lang="en">Skills</a>
        <a href="#projetos">Projetos</a>
        <a href="#sobre">Sobre</a>
        <a href="#contatos">Contatos</a>
        <a id="button" href="" lang="en">Download CV</a>
      </nav>
    </header>
    <a href="#" class="top-button"><i class="far fa-arrow-alt-circle-up"></i></a>
    <!-- Banner -->
    <section class="banner">
      <div class="folder">
        <div class="box">
          <h1 class="title">Moares Oliveira</h1>
          <h2 class="subtitle">Dev Student</h2>
        </div>
        <button class="button-banner download" lang="en">Download CV</button>
        <a href="#contatos"><button class="button-banner contatos">Contatos</button></a>
      </div>
    </section>
    <!-- Skills -->
    <section class="skills" id="skills">
      <h1 class="section-name">Skills</h1>
      <div class="tech">
        <div class="html">
          <img src="/assets/img/ico_html5.png" alt="" />
          <div class="wrapper-skill">
            <h1 class="skill-title">HTML</h1>
            <div class="progress-container">
              <div class="htmlprogress"></div>
            </div>
          </div>
        </div>
        <div class="css">
          <img src="/assets/img/ico_css3.png" alt="" />
          <div class="wrapper-skill">
            <h1 class="skill-title">CSS</h1>
            <div class="progress-container">
              <div class="cssprogress"></div>
            </div>
          </div>
        </div>
        <div class="jscript">
          <img src="/assets/img/ico_js.png" alt="" />
          <div class="wrapper-skill">
            <h1 class="skill-title">JavaScript</h1>
            <div class="progress-container">
              <div class="jsprogress"></div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- Projetos -->
    <section class="projetos" id="projetos">
      <h1 class="section-name">Projetos</h1>
    </section>
    <!-- Sobre -->
    <section class="sobre" id="sobre">
      <h1 class="section-name">Sobre</h1>
    </section>
    <!-- Contatos -->
    <section class="contatos" id="contatos">
      <h1 class="section-name">Contatos</h1>
    </section>
    <!-- Footer -->
    <footer></footer>
    <script src="https://kit.fontawesome.com/0dd55cd624.js" crossorigin="anonymous"></script>
  </body>
</html>
